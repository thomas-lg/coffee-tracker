name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

exclude-labels:
  - 'release'
  - 'wip'

categories:
  - title: '⚠️ Breaking Changes'
    labels: ['breaking']
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['fix']
  - title: '🔒 Security'
    labels: ['security']
  - title: '📚 Documentation'
    labels: ['documentation']
  - title: '🧹 Maintenance'
    labels: ['chore']
  - title: '🤖 GitHub Actions'
    labels: ['github-actions']
  - title: '📦 Dependencies'
    labels: ['dependencies']
  - title: '🗑️ Deprecations'
    labels: ['deprecated']

change-template: '- $TITLE (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ['breaking']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels:
      - 'fix'
      - 'documentation'
      - 'chore'
      - 'security'
      - 'github-actions'
      - 'dependencies'
      - 'deprecated'
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPO/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
