name: CI

# Runs on every PR and on pushes to main. Validates backend + frontend + the
# production Docker build. Does NOT push images — see release.yml for that.
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: these jobs only read the repo (no image push here).
permissions:
  contents: read

# A newer push to the same PR (or to main) cancels the in-flight run — the Docker
# build job is the expensive one to waste. Keyed by ref, so each PR and main are
# independent groups; ci.yml never publishes, so cancelling a main run is safe.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x
      # Cache the global NuGet package store, keyed on the committed lock files so the
      # key changes exactly when a resolved dependency changes.
      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      # Native OCR deps so the Tesseract-backed tests can run on the runner.
      # Mirror the dev/prod package set; TESSDATA_PREFIX is the PARENT of tessdata.
      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng libtesseract-dev libleptonica-dev
      # --locked-mode fails the restore if packages.lock.json is out of date, so a
      # dependency bump can't sneak in without an updated, reviewed lock file.
      - run: dotnet restore CoffeeTracker.sln --locked-mode
      - run: dotnet build CoffeeTracker.sln --no-restore --configuration Release
      - name: Test
        env:
          TESSDATA_PREFIX: /usr/share/tesseract-ocr/5
        run: dotnet test CoffeeTracker.sln --no-build --configuration Release --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    # This job builds + unit-tests only; @playwright/test's browser download is the
    # e2e job's concern, so skip it here to keep npm ci fast.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint --if-present
      # The production build is the comprehensive compile gate — it type-checks and
      # bundles the app + every library (via the source path aliases).
      - name: Build (production)
        working-directory: frontend
        run: npx ng build app --configuration production
      # Unit tests via the vitest builder (NOT Karma, so no --browsers). We run each
      # project whose specs compile in isolation; a spec that pulled another lib's
      # source would hit the ng-packagr rootDir limit, so cross-lib components are
      # guarded by the production build above instead. @coffee-tracker/auth holds the
      # most security-sensitive client logic (token/session/interceptor), so it — and
      # the app shell — are tested here too, not just built.
      - name: Unit tests (vitest)
        working-directory: frontend
        run: |
          npx ng test @coffee-tracker/util --no-watch
          npx ng test @coffee-tracker/ui --no-watch
          npx ng test @coffee-tracker/data --no-watch
          npx ng test @coffee-tracker/auth --no-watch
          npx ng test @coffee-tracker/coffees --no-watch
          npx ng test @coffee-tracker/admin --no-watch
          npx ng test app --no-watch

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Start the API on :5000 in the background. Development → REGISTRATION_ENABLED
      # is true (so tests register their own users) and OCR is disabled (no Tesseract
      # needed). The Angular dev server that Playwright starts proxies /api here.
      - name: Start backend API
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: dotnet run --project backend/CoffeeTracker.Api --urls http://localhost:5000 &
      # Poll the anonymous /api/config until the API answers (don't invent /api/health).
      - name: Wait for the API
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5000/api/config >/dev/null 2>&1; then
              echo "API ready"; exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"; exit 1
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      # Drift guard: re-derive the OpenAPI doc + typed client from the running backend
      # and fail if they differ from what's committed, so a backend contract change that
      # wasn't regenerated can't ship a stale frontend client that only breaks at runtime.
      - name: Check generated API client is up to date
        working-directory: frontend
        run: |
          curl -fsS http://localhost:5000/openapi/v1.json -o openapi.json
          npm run gen:api
          git diff --exit-code -- openapi.json packages/data/src/lib/models/api-types.ts \
            || { echo "::error::OpenAPI client is stale — run 'npm run gen:api' and commit the result."; exit 1; }
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      # Playwright starts the Angular dev server (ng serve on :4200) via webServer.
      - name: Run Playwright e2e
        working-directory: frontend
        run: npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    # Job-level permissions REPLACE the top-level set, so re-state contents: read
    # alongside the security-events: write needed to upload the Trivy scan.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      # Validate the production Dockerfile builds for amd64, and load it into the local
      # daemon so Trivy can scan the exact image. No push on CI.
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: coffee-tracker:ci
      # Report CRITICAL+HIGH CVEs to the Security tab (SARIF), non-blocking: base-image
      # HIGHs come and go with Trivy's vuln DB and are outside our control, so they must
      # not flake PRs. The hard gate below blocks only on a fixable CRITICAL.
      - name: Scan image for vulnerabilities (Trivy — report)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: coffee-tracker:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload Trivy results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
      # Hard gate: fail only on a FIXABLE CRITICAL vulnerability (vuln scanner only, so a
      # false-positive secret match can't block). Reuses the Trivy DB cached above.
      - name: Fail on fixable CRITICAL vulnerabilities (Trivy — gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: coffee-tracker:ci
          scanners: vuln
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
