name: CI

# Runs on every PR and on pushes to main. Validates backend + frontend + the
# production Docker build. Does NOT push images — see release.yml for that.
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: these jobs only read the repo (no image push here).
permissions:
  contents: read

# A newer push to the same PR (or to main) cancels the in-flight run — the Docker
# build job is the expensive one to waste. Keyed by ref, so each PR and main are
# independent groups; ci.yml never publishes, so cancelling a main run is safe.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # Cache the global NuGet package store. No packages.lock.json in this repo,
      # so key on the project files (changes when a PackageReference is added).
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      # Native OCR deps so the Tesseract-backed tests can run on the runner.
      # Mirror the dev/prod package set; TESSDATA_PREFIX is the PARENT of tessdata.
      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng libtesseract-dev libleptonica-dev
      - run: dotnet restore CoffeeTracker.sln
      - run: dotnet build CoffeeTracker.sln --no-restore --configuration Release
      - name: Test
        env:
          TESSDATA_PREFIX: /usr/share/tesseract-ocr/5
        run: dotnet test CoffeeTracker.sln --no-build --configuration Release --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint --if-present
      # The production build is the comprehensive compile gate — it type-checks and
      # bundles the app + every library (via the source path aliases).
      - name: Build (production)
        working-directory: frontend
        run: npx ng build app --configuration production
      # Unit tests via the vitest builder (NOT Karma, so no --browsers). We run each
      # project whose specs compile in isolation; a spec that pulled another lib's
      # source would hit the ng-packagr rootDir limit, so cross-lib components are
      # guarded by the production build above instead.
      - name: Unit tests (vitest)
        working-directory: frontend
        run: |
          npx ng test @coffee-tracker/util --no-watch
          npx ng test @coffee-tracker/ui --no-watch
          npx ng test @coffee-tracker/data --no-watch
          npx ng test @coffee-tracker/coffees --no-watch

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      # Validate the production Dockerfile builds for amd64. No push on CI.
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
