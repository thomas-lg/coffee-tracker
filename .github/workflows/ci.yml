name: CI

# Runs on every PR and on pushes to main. Validates backend + frontend + the
# production Docker build. Does NOT push images — see release.yml for that.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # Native OCR deps so the Tesseract-backed tests can run on the runner.
      # Mirror the dev/prod package set; TESSDATA_PREFIX is the PARENT of tessdata.
      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng libtesseract-dev libleptonica-dev
      - run: dotnet restore CoffeeTracker.sln
      - run: dotnet build CoffeeTracker.sln --no-restore --configuration Release
      - name: Test
        env:
          TESSDATA_PREFIX: /usr/share/tesseract-ocr/5
        run: dotnet test CoffeeTracker.sln --no-build --configuration Release --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The Angular app lands in M6. Until frontend/ exists this job is a green
      # no-op so the required "frontend" check still reports.
      - id: check
        run: |
          if [ -f frontend/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No frontend/ yet — skipping (added in M6)."
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm ci
      - if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npm run lint --if-present
      - if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npx ng build --configuration production
      - if: steps.check.outputs.exists == 'true'
        working-directory: frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The production Dockerfile lands in M7. Until it exists this job is a
      # green no-op so the required "docker-build" check still reports.
      - id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile yet — skipping (added in M7)."
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'true'
      # Validate the production Dockerfile builds for amd64. No push on CI.
      - uses: docker/build-push-action@v7
        if: steps.check.outputs.exists == 'true'
        with:
          context: .
          platforms: linux/amd64
          push: false
