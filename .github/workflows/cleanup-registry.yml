# release.yml pushes a `sha-<short>` tag on every main push (plus `latest`) and an
# attestation referrer per image, so sha-tagged images and their referrers pile up
# in GHCR. Prune weekly with an attestation-aware action: keep the 10 most recent
# sha-* (delete the rest older than 30d), never touch `latest`, and delete untagged
# layers — while preserving the build-provenance/cosign referrers of images we keep
# (dataaxiom only removes a referrer when its parent image is deleted).
name: Cleanup Container Registry

# RETENTION CONTRACT: sha-* tags are ephemeral (10 newest kept, rest pruned after
# 30 days). Anything that must keep pulling — the NAS, compose files, docs — must
# pin :latest, a semver tag, or an image digest, never an old sha-* tag.
on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"
  workflow_dispatch: # Allow manual trigger
    inputs:
      dry-run:
        description: "Dry run (log what would be deleted, delete nothing)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Prune old images (keeps attestations of retained tags)
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1
        with:
          packages: coffee-tracker
          delete-tags: sha-*
          keep-n-tagged: 10
          exclude-tags: latest
          delete-untagged: true
          older-than: 30 days
          dry-run: ${{ github.event.inputs.dry-run == 'true' }}
          token: ${{ secrets.GITHUB_TOKEN }}
