name: Release

# Builds and pushes the production image to GHCR. Triggered by pushes to main
# (=> :latest + :sha-<short>) and by version tags v* (=> semver tags).
# CI tests live in ci.yml; this workflow only builds + publishes.
on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write # mint the OIDC token for the build-provenance attestation
  attestations: write # record the attestation against the pushed image

env:
  IMAGE: ghcr.io/thomas-lg/coffee-tracker

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      # Signed proof of where/how the image was built, verifiable with
      # `gh attestation verify oci://ghcr.io/thomas-lg/coffee-tracker:<tag>`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
