name: Release

# Builds and pushes the production image to GHCR. Triggered by pushes to main
# (=> :latest + :sha-<short>) and by version tags v* (=> semver tags).
# CI tests live in ci.yml; this workflow only builds + publishes.
on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/thomas-lg/coffee-tracker

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The production Dockerfile lands in M7. Until it exists, skip the build/
      # publish so pushes to main don't fail (the job succeeds as a no-op).
      - id: check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile yet — skipping image publish (added in M7)."
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'true'
      - uses: docker/login-action@v3
        if: steps.check.outputs.exists == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        if: steps.check.outputs.exists == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v7
        if: steps.check.outputs.exists == 'true'
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
