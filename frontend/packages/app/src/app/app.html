<header class="sticky top-0 z-50 border-b border-line bg-latte/80 backdrop-blur">
  <div class="mx-auto flex h-16 max-w-5xl items-center gap-4 px-5">
    <a routerLink="/" class="flex items-center gap-2 font-display text-lg font-semibold">Coffee Tracker</a>

    @if (auth.isAuthenticated()) {
      <nav class="ml-2 hidden gap-1 sm:flex">
        <a
          routerLink="/"
          routerLinkActive="bg-crema/20 text-ink"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-full px-3 py-1.5 text-sm font-semibold text-muted hover:text-ink"
          >Home</a
        >
        <a
          routerLink="/coffees"
          routerLinkActive="bg-crema/20 text-ink"
          class="rounded-full px-3 py-1.5 text-sm font-semibold text-muted hover:text-ink"
          >Browse</a
        >
        <a
          routerLink="/coffees/new"
          routerLinkActive="bg-crema/20 text-ink"
          class="rounded-full px-3 py-1.5 text-sm font-semibold text-muted hover:text-ink"
          >Add</a
        >
        @if (auth.isAdmin()) {
          <a
            routerLink="/admin/photos"
            routerLinkActive="bg-crema/20 text-ink"
            class="rounded-full px-3 py-1.5 text-sm font-semibold text-muted hover:text-ink"
            >Admin</a
          >
        }
      </nav>
    }

    <div class="ml-auto flex items-center gap-2">
      <button
        (click)="toggleTheme()"
        class="grid size-9 place-items-center rounded-full border border-line bg-foam transition hover:border-cocoa"
        [attr.aria-label]="'Switch to ' + (theme() === 'dark' ? 'light' : 'dark') + ' mode'"
      >
        {{ theme() === 'dark' ? '☀️' : '🌙' }}
      </button>

      @if (auth.isAuthenticated()) {
        <span class="hidden text-sm text-muted sm:inline">{{ auth.displayName() ?? 'You' }}</span>
        <button
          (click)="logout()"
          class="rounded-full border border-line bg-foam px-3 py-1.5 text-sm font-semibold transition hover:border-cocoa"
        >
          Sign out
        </button>
      }
    </div>
  </div>
</header>

<main class="min-h-[calc(100dvh-4rem)]">
  <router-outlet />
</main>

<ct-toast />
